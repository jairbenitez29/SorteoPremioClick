<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprar Ticket - PremioClick</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="web-auto-login.js"></script>
    <style>
        .comprar-wrap { background: #f5f5f5; min-height: 100vh; padding-bottom: 48px; }
        .comprar-container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
        .comprar-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 24px; padding: 24px; }
        .loading { text-align: center; padding: 64px 24px; color: #666; }
        .loading i { font-size: 2rem; margin-bottom: 16px; display: block; }
        .error-msg { color: #c62828; padding: 12px 0; }
        #compraContainer { display: none; }
        .cantidad-option { cursor: pointer; padding: 16px; border: 2px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px; transition: all 0.2s; }
        .cantidad-option:hover, .cantidad-option.selected { border-color: #7b2cbf; background: #f3e8ff; }
        .cantidad-option-title { font-weight: 600; color: #212121; }
        .cantidad-option-price { font-size: 1.25rem; color: #7b2cbf; font-weight: 700; margin-top: 4px; }
        .precio-anterior { text-decoration: line-through; color: #999; font-size: 0.9rem; }
        .promo-badge { display: inline-block; background: #10b981; color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 6px; }
        .total-row { margin-top: 20px; padding-top: 16px; border-top: 2px solid #eee; font-size: 1.25rem; font-weight: 700; color: #212121; }
        .btn-comprar-now { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: #7b2cbf; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 16px; }
        .btn-comprar-now:hover { background: #6a1b9a; color: white; }
        .btn-comprar-now:disabled { opacity: 0.7; cursor: not-allowed; }
        .cantidad-stepper {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            padding: 10px 14px;
            border-radius: 10px;
        }
        .cantidad-stepper-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 2px solid #7b2cbf;
            background: #f3e8ff;
            color: #7b2cbf;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
        }
        .cantidad-stepper-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .cantidad-stepper-value {
            min-width: 50px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: #212121;
        }
        #errorMessage { display: none; background: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin: 12px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; padding: 24px; max-width: 400px; width: 100%; }
        .modal-content h3 { margin-top: 0; margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .modal-content button[type="submit"] { width: 100%; padding: 12px; background: #7b2cbf; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .user-info { display: none; align-items: center; gap: 12px; }
        .user-info .user-name { font-weight: 500; }
        .logout-btn { background: #5a5a5a; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo" style="text-decoration: none; cursor: pointer;">
                <img src="assets/logo.png" alt="PremioClick" class="logo-img">
                <span>PremioClick</span>
            </a>
            <div class="header-actions">
                <div class="user-info" id="userInfo">
                    <span class="user-name" id="userNameDisplay"></span>
                    <button class="logout-btn" id="logoutBtn" type="button" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <button class="login-btn" id="loginBtn" type="button" style="display: none;">
                    <i class="fas fa-user"></i>
                    <span>Iniciar Sesión</span>
                </button>
                <a href="https://www.mediafire.com/file/b7dtke9mvy9c2mt/application-c097c503-fd86-4d11-81da-a7cd3cfa893b.apk/file" target="_blank" rel="noopener noreferrer" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: #10b981; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 0.95rem;">
                    <i class="fas fa-mobile-alt"></i>
                    <span>Obtener app</span>
                </a>
            </div>
        </div>
        <div class="header-bar-app" style="background: #5a189a; padding: 10px 0; text-align: center;">
            <a href="index.html" style="color: rgba(255,255,255,0.9); text-decoration: none; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Volver a sorteos</a>
        </div>
    </header>

    <div class="comprar-wrap">
        <div class="comprar-container">
            <div id="loadingContainer" class="comprar-card loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Cargando...</p>
            </div>

            <div id="compraContainer" class="comprar-card">
                <h1 id="sorteoTitulo" style="margin-top: 0;"></h1>
                <p id="sorteoDescripcion" style="color: #616161;"></p>

                <p style="font-weight: 600; margin-bottom: 12px;">Selecciona cantidad:</p>
                <div class="cantidad-stepper" id="cantidadStepper">
                    <button type="button" id="menosBtn" class="cantidad-stepper-btn" aria-label="Restar">-</button>
                    <span id="cantidadStepperValue">1</span>
                    <button type="button" id="masBtn" class="cantidad-stepper-btn" aria-label="Sumar">+</button>
                </div>
                <div id="cantidadOptions"></div>

                <div class="total-row">Total: <span id="totalAmount">$0 CLP</span></div>
                <div id="errorMessage" class="error-msg"></div>
                <button type="button" id="comprarBtn" class="btn-comprar-now" disabled>
                    <i class="fas fa-shopping-cart"></i> <span>Comprar Ahora</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Login -->
    <div id="loginModal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3><i class="fas fa-user"></i> Iniciar sesión</h3>
            <div id="loginError" style="display: none; color: #c62828; margin-bottom: 12px;"></div>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Correo" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit" id="loginSubmitBtn">Iniciar sesión</button>
            </form>
            <button type="button" id="closeLoginModal" style="margin-top: 12px; background: #999; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; width: 100%;">Cerrar</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 PremioClick. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="comprar-ticket.js"></script>
</body>
</html>
